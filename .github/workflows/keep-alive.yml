name: Keep Supabase Awake

on:
  schedule:
    # Cada 3 días a las 12:00 UTC (09:00 en Chile aprox.)
    - cron: '0 12 */3 * *'
  workflow_dispatch:   # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          echo "Pinging Supabase..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/movimientos?select=count" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP status: $HTTP_CODE"
          # Cualquier respuesta del servidor (200, 401, etc.) cuenta como actividad.
          # Solo fallamos si no hubo respuesta de red (000 = no conectó).
          if [ "$HTTP_CODE" = "000" ]; then
            echo "No hubo respuesta del servidor"
            exit 1
          fi
          echo "Supabase respondió, proyecto activo."